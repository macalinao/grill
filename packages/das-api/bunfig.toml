# Mirrors the root bunfig.toml: bun only reads the bunfig.toml in its cwd, and
# package scripts (including turbo's) run from this directory.
[install]
# Supply-chain protection: only install package versions that have been
# published for at least 7 days, giving time for malicious or broken
# releases to be caught and yanked before they reach this repo.
minimumReleaseAge = 604800

[test]
coverage = true
coverageReporter = ["text"]
coverageSkipTestFiles = true
# The package is held at 100% coverage. Workspace dependencies resolve through a
# symlink to their own `dist/`, so they land in this package's coverage report;
# they are covered by their own test suites, not this one.
coveragePathIgnorePatterns = ["**/zod-solana/**"]
# Must be the scalar form: bun 1.3 silently ignores the `{ line = ..., function
# = ... }` table form, which would make this gate decorative.
coverageThreshold = 1
