name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.repository_owner == 'macalinao'

    env:
      # changesets commits the version bump, which fires the husky pre-commit hook
      # and runs lint-staged against the whole release commit. That is a lint gate
      # on the release, not on the change -- and when it trips, the release dies at
      # `git commit` with no packages published. CI already lints on the PR.
      HUSKY: 0

    permissions:
      contents: write
      packages: write
      pull-requests: write
      # Required for npm OIDC trusted publishing (provenance attestations)
      id-token: write

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6
        with:
          # This makes Actions fetch all Git history so that Changesets can generate changelogs with the correct commits
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # npm OIDC trusted publishing requires npm >= 11.5.1; Node 22 ships an
      # older npm, so upgrade it explicitly.
      - name: Upgrade npm for OIDC trusted publishing
        run: npm install -g npm@latest

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bc-${{ hashFiles('**/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bc-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          # This expects you to have a script called release which does a build for your packages and calls changeset publish
          publish: bun run ci:publish
          version: bun run ci:version
          commit: "chore: release packages"
          title: "chore: release packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send notification on release
        if: steps.changesets.outputs.published == 'true'
        run: |
          echo "Published packages:"
          echo "${{ steps.changesets.outputs.publishedPackages }}"
